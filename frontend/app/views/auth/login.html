<div class="auth-wrapper">

  <div class="auth-left">
    <div class="brand-content">
      <h1 class="brand-title">ShopSphere</h1>
      <p class="brand-subtitle">
        Discover premium products. Fast delivery. Secure checkout.
      </p>
    </div>
  </div>

  <div class="auth-right">
    <div class="auth-card">

      <h2 class="auth-heading">Welcome Back</h2>
      <p class="auth-subtext">Login to continue shopping</p>

      <form ng-submit="login()">

        <div class="form-group">
          <label>Email</label>
          <input type="email"
                 ng-model="user.email"
                 required />
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password"
                 ng-model="user.password"
                 required />
        </div>

        <div class="error-message" ng-if="error">
          {{ error }}
        </div>

        <button type="submit" class="btn-primary">
          Login
        </button>

      </form>

      <p class="auth-footer">
        Don’t have an account?
        <a href="#!/register">Create Account</a>
      </p>

      <p class="auth-footer">
        Selling on ShopSphere?
        <a href="#!/seller/login">Seller Login</a>
      </p>

    </div>
  </div>

</div>
